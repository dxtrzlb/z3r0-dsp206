name: Build Android APK

# Builds a standalone, installable Android APK on an Ubuntu runner with a pinned JDK 17 — a
# RELEASE build (the JS bundle is embedded, so it runs WITHOUT a Metro dev server), self-signed
# with a generated keystore. No Google Play account needed. Trigger from the Actions tab or a
# v* tag. Sideload it: enable "install unknown apps".
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate the native Android project
        run: npx expo prebuild --platform android --no-install
        working-directory: apps/ipad

      - name: Generate a signing keystore
        run: keytool -genkeypair -v -keystore release.keystore -alias z3r0 -keyalg RSA -keysize 2048 -validity 10000 -storepass z3r0dsp -keypass z3r0dsp -dname "CN=z3r0 DSP 206, O=z3r0, C=US"
        working-directory: apps/ipad/android

      - name: Build release APK (JS bundle embedded — runs without Metro)
        run: ./gradlew assembleRelease --no-daemon -Pandroid.injected.signing.store.file=$PWD/release.keystore -Pandroid.injected.signing.store.password=z3r0dsp -Pandroid.injected.signing.key.alias=z3r0 -Pandroid.injected.signing.key.password=z3r0dsp
        working-directory: apps/ipad/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: z3r0-dsp206-android
          path: apps/ipad/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
